<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<title>Renovation Projects | 4Constructions</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}
</style>

</head>

<body>

<h1>🏠 Renovation Projects</h1>

<div class="gallery">

<a href="images/renovation/renovation-1.jpg" data-lightbox="renovation">
<img src="images/renovation/renovation-1.jpg">
</a>

<a href="images/renovation/renovation-2.jpg" data-lightbox="renovation">
<img src="images/renovation/renovation-2.jpg">
</a>

<a href="images/renovation/renovation-3.jpg" data-lightbox="renovation">
<img src="images/renovation/renovation-3.jpg">
</a>

<a href="images/renovation/renovation-4.jpg" data-lightbox="renovation">
<img src="images/renovation/renovation-4.jpg">
</a>

<a href="images/renovation/renovation-5.jpg" data-lightbox="renovation">
<img src="images/renovation/renovation-5.jpg">
</a>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script>
lightbox.option({
  wrapAround: true,
  albumLabel: "Image %1 of %2"
});
</script>
</body>
</html>
